<!DOCTYPE html>
<html>
<head>
    <title>Super Mario Kart - Redesigned</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="../assets/images/jb-logo.png">
    <!-- Disable caching during development -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100dvw;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;

            width: auto;
            height: 98vh;
            max-width: 100vw;
            max-height: 100vh;

            border: 2px solid #333;
        }

        /* ── Mobile touch controls ─────────────────────── */
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 100;
        }
        #mobile-controls.visible { display: flex; }

        #dpad {
            position: fixed;
            bottom: 24px;
            left: 20px;
            width: 132px;
            height: 132px;
            pointer-events: none;
        }
        .dpad-btn {
            position: absolute;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 10px;
            pointer-events: all;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: rgba(255,255,255,0.75);
            transition: background 0.08s;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad-btn.pressed { background: rgba(255,255,255,0.45); }
        #btn-up    { top: 0;    left: 44px; width: 44px; height: 44px; }
        #btn-down  { top: 88px; left: 44px; width: 44px; height: 44px; }
        #btn-left  { top: 44px; left: 0;    width: 44px; height: 44px; }
        #btn-right { top: 44px; left: 88px; width: 44px; height: 44px; }

        #action-btns {
            position: fixed;
            bottom: 24px;
            right: 20px;
            width: 140px;
            height: 132px;
            pointer-events: none;
        }
        .action-btn {
            position: absolute;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 50%;
            pointer-events: all;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            font-family: monospace;
            color: rgba(255,255,255,0.85);
            transition: background 0.08s;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn.pressed { background: rgba(255,255,255,0.45); }
        #btn-a     { bottom: 0;  right: 50px; width: 52px; height: 52px; background: rgba(80,200,80,0.25);  border-color: rgba(80,255,80,0.5); }
        #btn-b     { bottom: 0;  right: 0;    width: 52px; height: 52px; background: rgba(200,80,80,0.25);  border-color: rgba(255,80,80,0.5); }
        #btn-l     { top: 0;     right: 0;    width: 52px; height: 52px; background: rgba(80,80,200,0.25);  border-color: rgba(80,80,255,0.5); }
        #btn-start { top: 0;     right: 55px; width: 52px; height: 52px; background: rgba(200,200,80,0.25); border-color: rgba(255,255,80,0.5); font-size: 11px; }

        #portrait-warn {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            color: #fff;
            font-family: monospace;
            font-size: 18px;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }
        #portrait-warn.visible { display: flex; }
        #portrait-warn .rotate-icon { font-size: 52px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="portrait-warn">
        <div class="rotate-icon">↻</div>
        <div>Rotate your device<br>to landscape to play</div>
    </div>

    <div id="dpad">
        <div class="dpad-btn" id="btn-up">▲</div>
        <div class="dpad-btn" id="btn-down">▼</div>
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-right">▶</div>
    </div>

    <div id="action-btns">
        <div class="action-btn" id="btn-a">A<br><small>GO</small></div>
        <div class="action-btn" id="btn-b">B<br><small>BACK</small></div>
        <div class="action-btn" id="btn-l">L<br><small>JUMP</small></div>
        <div class="action-btn" id="btn-start">START</div>
    </div>

    <!-- Auto cache-busting: loads fresh game.js every time -->
    <script type="module">
        import('./game.js?t=' + new Date().getTime());
    </script>
</body>
</html>
