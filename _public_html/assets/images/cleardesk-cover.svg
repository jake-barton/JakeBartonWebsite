<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0e14"/>
      <stop offset="100%" style="stop-color:#111318"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13161e"/>
      <stop offset="100%" style="stop-color:#0f1116"/>
    </linearGradient>
    <linearGradient id="blueaccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenaccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle blue ambient glow -->
  <ellipse cx="400" cy="250" rx="300" ry="200" fill="#2563eb" opacity="0.04" filter="url(#softglow)"/>

  <!-- macOS window chrome -->
  <rect x="40" y="30" width="720" height="440" rx="12" fill="#1a1d26" stroke="#2a2d3a" stroke-width="1"/>
  <!-- Traffic lights -->
  <circle cx="68" cy="55" r="7" fill="#ff5f57"/>
  <circle cx="88" cy="55" r="7" fill="#ffbd2e"/>
  <circle cx="108" cy="55" r="7" fill="#28c840"/>
  <!-- Title bar -->
  <text x="400" y="60" font-family="-apple-system, sans-serif" font-size="13" font-weight="500" fill="#6b7280" text-anchor="middle">ClearDesk</text>
  <line x1="40" y1="72" x2="760" y2="72" stroke="#2a2d3a" stroke-width="1"/>

  <!-- Left sidebar -->
  <rect x="40" y="72" width="200" height="398" fill="url(#sidebar)" rx="0"/>
  <rect x="240" y="72" width="1" height="398" fill="#2a2d3a"/>

  <!-- Sidebar nav -->
  <text x="60" y="103" font-family="-apple-system, sans-serif" font-size="10" fill="#4b5563" font-weight="600" letter-spacing="1">MENU</text>
  <rect x="52" y="112" width="172" height="30" rx="6" fill="#2563eb" opacity="0.15"/>
  <text x="72" y="132" font-family="-apple-system, sans-serif" font-size="12" fill="#3b82f6">⬡  Today</text>
  <text x="72" y="162" font-family="-apple-system, sans-serif" font-size="12" fill="#6b7280">📋  All Tasks</text>
  <text x="72" y="192" font-family="-apple-system, sans-serif" font-size="12" fill="#6b7280">📁  Projects</text>
  <text x="72" y="222" font-family="-apple-system, sans-serif" font-size="12" fill="#6b7280">📧  Email Inbox</text>
  <text x="72" y="252" font-family="-apple-system, sans-serif" font-size="12" fill="#6b7280">🔍  Search</text>

  <!-- Streak / gamification -->
  <rect x="52" y="320" width="172" height="60" rx="8" fill="#1e2430"/>
  <text x="72" y="342" font-family="-apple-system, sans-serif" font-size="11" fill="#f59e0b">🔥 8-day streak</text>
  <rect x="62" y="350" width="152" height="6" rx="3" fill="#2a2d3a"/>
  <rect x="62" y="350" width="95" height="6" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="72" y="374" font-family="-apple-system, sans-serif" font-size="10" fill="#4b5563">425 pts this week</text>

  <!-- AI badge -->
  <rect x="52" y="400" width="172" height="52" rx="8" fill="#0d1117" stroke="#2563eb" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="72" y="420" font-family="-apple-system, sans-serif" font-size="10" fill="#3b82f6">🤖 AI parsed 3 tasks</text>
  <text x="72" y="438" font-family="-apple-system, sans-serif" font-size="9" fill="#4b5563">from your inbox today</text>

  <!-- Main content area - Today view -->
  <text x="262" y="103" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#f9fafb">Today</text>
  <text x="262" y="120" font-family="-apple-system, sans-serif" font-size="11" fill="#4b5563">Friday, April 3 · 3 tasks</text>

  <!-- Quick capture bar -->
  <rect x="262" y="130" width="476" height="36" rx="8" fill="#0d1117" stroke="#2a2d3a" stroke-width="1"/>
  <text x="280" y="153" font-family="-apple-system, sans-serif" font-size="12" fill="#374151">⌘⇧T  Quick capture…</text>
  <rect x="694" y="136" width="36" height="24" rx="5" fill="#2563eb" opacity="0.8"/>
  <text x="712" y="152" font-family="-apple-system, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Add</text>

  <!-- Task items -->
  <!-- Task 1 - completed -->
  <rect x="262" y="178" width="476" height="46" rx="8" fill="#13161e" opacity="0.7"/>
  <circle cx="282" cy="201" r="9" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="282" y="206" font-family="-apple-system, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">✓</text>
  <text x="302" y="197" font-family="-apple-system, sans-serif" font-size="12" fill="#4b5563" text-decoration="line-through">Reply to Prof. Smith email</text>
  <text x="302" y="213" font-family="-apple-system, sans-serif" font-size="10" fill="#374151">Extracted from Gmail · Due 10am</text>
  <rect x="668" y="185" width="58" height="18" rx="4" fill="#059669" opacity="0.2"/>
  <text x="697" y="197" font-family="-apple-system, sans-serif" font-size="9" fill="#10b981" text-anchor="middle">Done</text>

  <!-- Task 2 - high priority -->
  <rect x="262" y="234" width="476" height="46" rx="8" fill="#13161e"/>
  <circle cx="282" cy="257" r="9" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="302" y="253" font-family="-apple-system, sans-serif" font-size="12" fill="#f9fafb">Calculus homework — Chapter 7</text>
  <text x="302" y="269" font-family="-apple-system, sans-serif" font-size="10" fill="#374151">Due today 6:00 PM</text>
  <rect x="652" y="241" width="74" height="18" rx="4" fill="#dc2626" opacity="0.2"/>
  <text x="689" y="253" font-family="-apple-system, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">High Priority</text>

  <!-- Task 3 - AI parsed -->
  <rect x="262" y="290" width="476" height="46" rx="8" fill="#13161e"/>
  <circle cx="282" cy="313" r="9" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="302" y="309" font-family="-apple-system, sans-serif" font-size="12" fill="#f9fafb">Pay electricity bill</text>
  <text x="302" y="325" font-family="-apple-system, sans-serif" font-size="10" fill="#374151">📷 OCR from photo · $94.20 · Due Apr 8</text>
  <rect x="644" y="297" width="82" height="18" rx="4" fill="#7c3aed" opacity="0.2"/>
  <text x="685" y="309" font-family="-apple-system, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">AI Extracted</text>

  <!-- SMS morning digest preview -->
  <rect x="262" y="352" width="476" height="90" rx="8" fill="#0d1117" stroke="#2a2d3a" stroke-width="1"/>
  <text x="280" y="374" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280">📱 Morning SMS Digest</text>
  <rect x="280" y="382" width="340" height="50" rx="6" fill="#1a1d26"/>
  <text x="296" y="400" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">Good morning Jake! Today's 3 priorities:</text>
  <text x="296" y="415" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">1) Calculus (6pm)  2) Prof Smith  3) Electricity</text>
  <text x="296" y="428" font-family="-apple-system, sans-serif" font-size="9" fill="#3b82f6">Reply "done 2" to complete →</text>

  <!-- Watermark -->
  <text x="400" y="488" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.12" text-anchor="middle" letter-spacing="3">CLEARDESK · AI TASK MANAGER · ELECTRON · IN DEVELOPMENT</text>
</svg>
