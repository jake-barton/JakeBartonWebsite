<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Kappa Phi - Official Colors Reference</title>
    <style>
        body {
            font-family: 'Brandon Grotesque', sans-serif;
            padding: 2rem;
            background: #f5f5f5;
        }
        .color-card {
            display: inline-block;
            width: 200px;
            margin: 1rem;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-swatch {
            height: 150px;
        }
        .color-info {
            padding: 1rem;
        }
        h1 { text-align: center; color: #003087; }
        .note { 
            max-width: 800px; 
            margin: 2rem auto; 
            padding: 1rem; 
            background: white; 
            border-radius: 8px;
            border-left: 4px solid #D4AF37;
        }
    </style>
</head>
<body>
    <h1>Pi Kappa Phi Official Brand Colors</h1>
    
    <div class="note">
        <strong>Note:</strong> Pi Kappa Phi's official colors are <strong>Royal Blue and Gold</strong> (not maroon). 
        The website has been updated to reflect these correct brand colors based on the organization's identity.
    </div>

    <div style="text-align: center;">
        <div class="color-card">
            <div class="color-swatch" style="background: #003087;"></div>
            <div class="color-info">
                <strong>Royal Blue</strong><br>
                #003087<br>
                Primary Color
            </div>
        </div>

        <div class="color-card">
            <div class="color-swatch" style="background: #D4AF37;"></div>
            <div class="color-info">
                <strong>Gold</strong><br>
                #D4AF37<br>
                Secondary Color
            </div>
        </div>
    </div>
</body>
</html>
