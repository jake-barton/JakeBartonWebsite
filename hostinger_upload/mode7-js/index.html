<!DOCTYPE html>
<html>
<head>
    <title>Super Mario Kart - Redesigned</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            transform: translateZ(0);
            will-change: transform;
            
            width: auto;
            height: 98vh;
            max-width: 100vw;
            max-height: 100vh;
            
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <!-- Auto cache-busting: loads fresh game.js every time -->
    <script type="module">
        import('./game.js?t=' + new Date().getTime());
    </script>
</body>
</html>
